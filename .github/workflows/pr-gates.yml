name: PR Gates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gates-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-pr:
    name: quality-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff lint
        run: python -m ruff check app tests

      - name: Run tests
        run: python -m pytest -q

  security-pr:
    name: security-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Dependency audit
        run: python -m pip_audit --ignore-vuln CVE-2026-3219

      - name: Install gitleaks
        run: curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin v8.24.3

      - name: Gitleaks secret scan
        run: gitleaks git --redact --no-banner
